<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices Form</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="body-bg">
    <div class="container">
        <div class="gif">
            <img src="./assets/pic/money-exchange.gif" alt="">
        </div>
        <form action="#" class="form">
            <div class="header-text">
                <span> <i class="fa-solid fa-arrow-right-to-bracket fa-beat" style="color: rgb(176, 40, 40);"></i>
                    Login</span>
                <p>Access your account securely</p>
            </div>
            <div class="form-content">
                <label for="userName">Username:</label>
                <input type="text" name="userName" id="userName" required><br>
                <label for="pass">Password:</label>
                <input type="password" name="pass" id="pass" required><br>
                <a href="#"> <i class="fa-solid fa-person-circle-plus" style="color: rgb(54, 152, 122);"></i>
                    Register</a> <br>
                <button type="submit" class="submit main-btn-style">Submit</button>
            </div>
        </form>
    </div>


    <script src="./assets/js/script.js"></script>
</body>

</html>
